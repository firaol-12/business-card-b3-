<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Business Card - WebGL Approach</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script> -->
    <script src="./libs/mindar/mindar-image-three.prod.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Scanning UI */
        #scanning {
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            inset: 0;
            background: transparent;
            z-index: 2;
            pointer-events: none;
        }

        #scanning .inner {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background:
                linear-gradient(to right, white 10px, transparent 10px) 0 0,
                linear-gradient(to right, white 10px, transparent 10px) 0 100%,
                linear-gradient(to left, white 10px, transparent 10px) 100% 0,
                linear-gradient(to left, white 10px, transparent 10px) 100% 100%,
                linear-gradient(to bottom, white 10px, transparent 10px) 0 0,
                linear-gradient(to bottom, white 10px, transparent 10px) 100% 0,
                linear-gradient(to top, white 10px, transparent 10px) 0 100%,
                linear-gradient(to top, white 10px, transparent 10px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 40px 40px;
        }

        @media (min-aspect-ratio: 1/1) {
            #scanning .inner { width: 50vh; height: 35vh; }
        }
        @media (max-aspect-ratio: 1/1) {
            #scanning .inner { width: 80vw; height: 55vw; }
        }

        #scanning.hidden { display: none; }

        #scanning .scanline {
            position: absolute;
            width: 100%; height: 4px;
            background: linear-gradient(to right, transparent, #00ffcc, transparent);
            box-shadow: 0 0 10px #00ffcc;
            animation: scan 2s linear infinite;
        }

        #scanning .hint {
            position: absolute;
            bottom: -40px;
            color: white;
            font-size: 14px;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: calc(100% - 4px); }
        }

        /* Tap zones - invisible overlays for button detection */
        #tap-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        #tap-overlay.active {
            pointer-events: all;
            display: block;
        }

        .tap-zone {
            position: absolute;
            cursor: pointer;
            /* Uncomment below to debug tap zones */
            /* background: rgba(255,0,0,0.3); border: 1px solid red; */
        }

        /* Freeze button */
        #freezeBtn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(0,0,0,0.75);
            border: 2px solid rgba(255,255,255,0.6);
            color: white;
            font-size: 22px;
            cursor: pointer;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
        }

        #freezeBtn.visible { display: flex; }
        #freezeBtn.frozen { background: rgba(76,175,80,0.85); border-color: #4CAF50; }

        /* Loading indicator */
        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            color: white;
            gap: 16px;
        }

        #loading.hidden { display: none; }

        .loader-ring {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00ffcc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #loading p { font-size: 14px; opacity: 0.6; letter-spacing: 2px; }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
    <div class="loader-ring"></div>
    <p>LOADING AR</p>
</div>

<!-- Scanning Overlay -->
<div id="scanning">
    <div class="inner">
        <div class="scanline"></div>
        <span class="hint">Point at business card</span>
    </div>
</div>

<!-- AR Container -->
<div id="container"></div>

<!-- Tap Zones (invisible buttons over the WebGL plane) -->
<div id="tap-overlay">
    <!-- These zones are positioned by JS based on screen position of the AR plane -->
    <div class="tap-zone" id="zone-email"></div>
    <div class="tap-zone" id="zone-phone"></div>
    <div class="tap-zone" id="zone-location"></div>
    <div class="tap-zone" id="zone-facebook"></div>
    <div class="tap-zone" id="zone-instagram"></div>
    <div class="tap-zone" id="zone-telegram"></div>
    <div class="tap-zone" id="zone-whatsapp"></div>
    <div class="tap-zone" id="zone-youtube"></div>
</div>

<!-- Freeze Button -->
<button id="freezeBtn" title="Freeze AR">❄️</button>

<script type="module">
const THREE = window.MINDAR.IMAGE.THREE;

// ============================================================
// CONFIGURATION — Edit this section for your client
// ============================================================
const CONFIG = {
    mindFile: './assets/targets.mind',  // your .mind file path

    // Card image — design this in Figma/Canva, export as PNG
    // Make it 1400x900px, transparent background
    cardImage: './assets/card.png',

    // Video texture (optional — set to null to disable)
    videoSrc: null, // e.g. './assets/intro.mp4'

    // Card size in AR world units (adjust to match your target image size)
    cardWidth: 1.4,
    cardHeight: 0.9,

    // Links for each button
    links: {
        email:     'mailto:your@email.com',
        phone:     'tel:+251942090003',
        location:  'https://maps.google.com/?q=Addis+Ababa',
        facebook:  'https://facebook.com/yourpage',
        instagram: 'https://instagram.com/yourpage',
        telegram:  'https://t.me/firaol_112',
        whatsapp:  'https://wa.me/251900000000',
        youtube:   'https://youtube.com/@yourchannel',
    },

    // Tap zone positions as percentage of card (left%, top%, width%, height%)
    // Measure these from your Figma design
    tapZones: {
        email:     { l: 52, t: 30, w: 20, h: 12 },
        phone:     { l: 52, t: 48, w: 20, h: 12 },
        location:  { l: 52, t: 66, w: 20, h: 12 },
        facebook:  { l: 5,  t: 78, w: 10, h: 15 },
        instagram: { l: 20, t: 78, w: 10, h: 15 },
        telegram:  { l: 35, t: 78, w: 10, h: 15 },
        whatsapp:  { l: 50, t: 78, w: 10, h: 15 },
        youtube:   { l: 65, t: 78, w: 10, h: 15 },
    }
};
// ============================================================

document.addEventListener('DOMContentLoaded', async () => {

    const loadingEl  = document.getElementById('loading');
    const scanningEl = document.getElementById('scanning');
    const tapOverlay = document.getElementById('tap-overlay');
    const freezeBtn  = document.getElementById('freezeBtn');

    // Setup MindAR
    const mindarThree = new window.MINDAR.IMAGE.MindARThree({
        container: document.querySelector('#container'),
        imageTargetSrc: CONFIG.mindFile,
        uiScanning: 'no',   // we use our own scanning UI
        uiLoading: 'no',
    });

    const { renderer, cssRenderer, scene, cssScene, camera } = mindarThree;

    // ── Build the card plane ──────────────────────────────────
    let cardMesh;

    if (CONFIG.videoSrc) {
        // VIDEO TEXTURE approach
        const video = document.createElement('video');
        video.src = CONFIG.videoSrc;
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.setAttribute('playsinline', '');

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        const geometry = new THREE.PlaneGeometry(CONFIG.cardWidth, CONFIG.cardHeight);
        const material = new THREE.MeshBasicMaterial({
            map: videoTexture,
            transparent: true,
            side: THREE.DoubleSide,
        });

        cardMesh = new THREE.Mesh(geometry, material);

        // Tap to play/pause video
        tapOverlay.addEventListener('click', (e) => {
            if (e.target === tapOverlay) {
                video.paused ? video.play() : video.pause();
            }
        });

        // Auto-play when target found
        mindarThree.addAnchor(0).onTargetFound = () => video.play();

    } else {
        // STATIC IMAGE approach
        const texture = new THREE.TextureLoader().load(CONFIG.cardImage);
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;

        const geometry = new THREE.PlaneGeometry(CONFIG.cardWidth, CONFIG.cardHeight);
        const material = new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            side: THREE.DoubleSide,
        });

        cardMesh = new THREE.Mesh(geometry, material);
    }

    // ── Attach to AR anchor ───────────────────────────────────
    const anchor = mindarThree.addAnchor(0);
    anchor.group.add(cardMesh);

    // ── Tap zones setup ───────────────────────────────────────
    // Wire up link taps
    Object.entries(CONFIG.links).forEach(([key, url]) => {
        const zone = document.getElementById(`zone-${key}`);
        if (zone) {
            zone.addEventListener('click', () => window.open(url, '_blank'));
        }
    });

    // Update tap zone screen positions based on where the 3D plane is on screen
    function updateTapZones() {
        if (!cardMesh.visible) return;

        // Project the card corners to screen space
        const cardPos = new THREE.Vector3();
        cardMesh.getWorldPosition(cardPos);
        cardPos.project(camera);

        const sw = window.innerWidth;
        const sh = window.innerHeight;

        // Center of card in screen pixels
        const cx = (cardPos.x * 0.5 + 0.5) * sw;
        const cy = (1 - (cardPos.y * 0.5 + 0.5)) * sh;

        // Card size in pixels (approximate based on projection)
        // You may need to tune these scale factors for your setup
        const pw = CONFIG.cardWidth * 250;
        const ph = CONFIG.cardHeight * 250;

        const cardLeft = cx - pw / 2;
        const cardTop  = cy - ph / 2;

        Object.entries(CONFIG.tapZones).forEach(([key, z]) => {
            const zone = document.getElementById(`zone-${key}`);
            if (zone) {
                zone.style.left   = `${cardLeft + (z.l / 100) * pw}px`;
                zone.style.top    = `${cardTop  + (z.t / 100) * ph}px`;
                zone.style.width  = `${(z.w / 100) * pw}px`;
                zone.style.height = `${(z.h / 100) * ph}px`;
            }
        });
    }

    // ── Target found / lost ───────────────────────────────────
    let isTargetFound = false;

    anchor.onTargetFound = () => {
        isTargetFound = true;
        scanningEl.classList.add('hidden');
        tapOverlay.classList.add('active');
        freezeBtn.classList.add('visible');

        // Simple fade-in
        cardMesh.material.opacity = 0;
        cardMesh.material.transparent = true;
        let opacity = 0;
        const fadeIn = setInterval(() => {
            opacity = Math.min(opacity + 0.05, 1);
            cardMesh.material.opacity = opacity;
            if (opacity >= 1) clearInterval(fadeIn);
        }, 16);
    };

    anchor.onTargetLost = () => {
        isTargetFound = false;
        if (!isFrozen) {
            scanningEl.classList.remove('hidden');
            tapOverlay.classList.remove('active');
        }
    };

    // ── Freeze ────────────────────────────────────────────────
    let isFrozen = false;

    freezeBtn.addEventListener('click', () => {
        isFrozen = !isFrozen;
        freezeBtn.textContent = isFrozen ? '🔓' : '❄️';
        freezeBtn.classList.toggle('frozen', isFrozen);

        if (isFrozen) {
            scanningEl.classList.add('hidden');
            tapOverlay.classList.add('active');
        } else if (!isTargetFound) {
            scanningEl.classList.remove('hidden');
            tapOverlay.classList.remove('active');
        }
    });

    // ── Start ─────────────────────────────────────────────────
    await mindarThree.start();
    loadingEl.classList.add('hidden');
    scanningEl.classList.remove('hidden');

    // ── Render loop ───────────────────────────────────────────
renderer.setAnimationLoop(() => {
    if (isTargetFound || isFrozen) {
        updateTapZones();
    }
    cssRenderer.render(cssScene, camera);
    renderer.render(scene, camera);
});
});
</script>

</body>
</html>
